name: Build WRT
run-name: Build - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:
          - aliyun_ap8220_immwrt
          - cmcc_rax3000m_immwrt
          - gemtek_w1701k_immwrt
          - jdcloud_ax6000_immwrt
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - link_nn6000v2_immwrt
          - linksys_mx4x00_immwrt
          - qihoo_360v6_immwrt
          - redmi_ax5_immwrt
          - redmi_ax6_immwrt
          - redmi_ax6_libwrt
          - redmi_ax6000_immwrt21
          - zn_m2_immwrt
          - zn_m2_libwrt
          - x64_immwrt

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# 必须显式声明权限，否则无法删除旧缓存
permissions:
  contents: read
  actions: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Free disk space
        uses: sbwml/actions@free-disk

      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          echo "BUILD_DATE=$(date +"%y.%m.%d_%H.%M.%S")" >> $GITHUB_ENV

      - name: Pre Clone
        run: |
          chmod +x ./wrt_core/pre_clone_action.sh
          ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      - name: Cache Dependencies
        id: cache-step
        uses: actions/cache@v4
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          # 关键优化：加入 inputs.model，防止不同硬件平台的缓存冲突
          key: ${{ matrix.os }}-${{ inputs.model }}-${{ hashFiles('**/repo_flag') }}
          restore-keys: |
            ${{ matrix.os }}-${{ inputs.model }}-

      - name: Refresh the cache
        if: steps.cache-step.outputs.cache-hit == 'true'
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            echo "Updating timestamps for staging_dir to avoid rebuild issues..."
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" -exec touch {} +
          fi

      - name: Build Firmware
        run: |
          chmod +x ./build.sh
          ./build.sh ${{ inputs.model }}

      - name: Delete Old Cache
        if: always()
        run: |
          echo "======== Cleaning redundant caches for ${{ inputs.model }} ========"
          # 获取当前模型的所有缓存，删除旧的，保留最新的
          gh cache list --key ${{ matrix.os }}-${{ inputs.model }}- --json key --jq '.[] | .key' | while read -r key; do
            if [ "$key" != "${{ steps.cache-step.outputs.cache-primary-key }}" ]; then
              echo "Deleting old cache: $key"
              gh cache delete "$key" || true
            fi
          done
          
          echo "======== Cache Status ========"
          [ -d ./action_build/.ccache ] && echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          [ -d ./action_build/staging_dir ] && echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: Machine Information
        run: |
          echo "=============================================="
          lscpu | grep -E "name|Core|Thread"
          echo "=============================================="
          df -h
          echo "=============================================="

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          path: ./firmware/*.*
